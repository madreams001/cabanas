name: Sync master → main
on:
  push:
    branches: [master]
    paths:
      - 'proyectos/cabanas/**'
      - '.github/workflows/**'
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - run: |
          git config user.name "opencode-auto"
          git config user.email "opencode@cabanas.local"
          git push origin master:main --force
      - name: Trigger deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run "Deploy minified to Pages" --ref main --repo ${{ github.repository }}
