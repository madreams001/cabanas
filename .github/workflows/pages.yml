name: Deploy minified to Pages
on:
  push:
    branches: [master]
    paths:
      - 'proyectos/cabanas/minis/**'
      - '.github/workflows/pages.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: proyectos/cabanas/minis
      - id: deployment
        uses: actions/deploy-pages@v4
