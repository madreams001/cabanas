name: Deploy minified to Pages
on:
  push:
    branches: [main]
    paths:
      - 'proyectos/cabanas/minis/**'
      - 'proyectos/cabanas/index.html'
      - 'proyectos/cabanas/script.html'
      - 'proyectos/cabanas/index.min.html'
      - 'proyectos/cabanas/minify.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: proyectos/cabanas/minis
      - id: deployment
        uses: actions/deploy-pages@v4
